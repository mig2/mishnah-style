name: kb-validate

on:
  push:
    paths:
      - "entities/**"
      - "scripts/kb-*.py"
      - ".github/workflows/kb-validate.yml"
  pull_request:
    paths:
      - "entities/**"
      - "scripts/kb-*.py"
      - ".github/workflows/kb-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r entities/requirements.txt
      - run: python3 scripts/kb-validate.py
      - run: python3 scripts/kb-selftest.py   # §8 merge-rule invariants (offline)
      - run: python3 scripts/kb-build.py       # smoke: YAML compiles to knowledge.db
